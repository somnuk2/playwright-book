<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Playwright Book Demo - Checkout</title><link rel="stylesheet" href="/styles.css"></head>
<body><header><h1>Checkout</h1></header><main><section class="card"><h2>Customer information</h2><form data-test="checkout-form"><label for="first-name">First name</label><input id="first-name" data-test="first-name"><label for="last-name">Last name</label><input id="last-name" data-test="last-name"><label for="postal-code">Postal code</label><input id="postal-code" data-test="postal-code"><p class="error" data-test="checkout-error" role="alert"></p><button type="submit" data-test="finish">Finish</button></form></section></main><script src="/app.js"></script><script>
demo.requireUser();
document.querySelector('[data-test="checkout-form"]').addEventListener('submit', async (event) => { event.preventDefault(); const firstName = document.querySelector('[data-test="first-name"]').value.trim(); const lastName = document.querySelector('[data-test="last-name"]').value.trim(); const postalCode = document.querySelector('[data-test="postal-code"]').value.trim(); const error = document.querySelector('[data-test="checkout-error"]'); if (!firstName || !lastName || !postalCode) { error.textContent = 'Checkout information is required.'; return; } await fetch('/api/orders', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ firstName, lastName, postalCode, items: demo.getCart() }) }); demo.setCart([]); location.href = '/thank-you.html'; });
</script></body></html>
